<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Vinyl DJ Library{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/htmx-json-enc.js"></script>
</head>
<body>
  <button
    class="quit-btn"
    hx-post="/shutdown"
    hx-confirm="Stop the Vinyl DJ Library server? You'll need to restart it from the terminal to use the app again."
    hx-target="body"
    hx-swap="innerHTML"
    title="Stop the local server"
  >Quit</button>
  <a href="/tap-bpm" class="tap-bpm-nav-link" title="Live tap-tempo BPM counter">Tap BPM</a>
  {% block content %}{% endblock %}
</body>
</html>
