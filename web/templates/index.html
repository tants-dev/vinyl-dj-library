{% extends "base.html" %}
{% block content %}
  <h1>Vinyl DJ Library</h1>

  <div class="status-bar">
    <span>
      {% if last_synced %}Last synced: {{ last_synced }}{% else %}Not synced yet{% endif %}
      &middot; {{ unenriched_count }} track(s) need BPM/key
    </span>
    <span>
      <button
        hx-post="/sync"
        hx-target="#status-message"
        hx-swap="innerHTML"
        hx-indicator="#sync-spinner"
        hx-disabled-elt="this"
      >Sync Discogs</button>
      <span id="sync-spinner" class="htmx-indicator">
        <span class="spinner"></span> Syncing&hellip; this can take a minute
      </span>
      <button
        hx-post="/enrich"
        hx-target="#status-message"
        hx-swap="innerHTML"
        hx-indicator="#enrich-spinner"
        hx-disabled-elt="this"
      >Enrich BPM/key</button>
      <span id="enrich-spinner" class="htmx-indicator">
        <span class="spinner"></span> Enriching&hellip;
      </span>
    </span>
  </div>
  <div id="status-message"></div>

  <form
    id="controls"
    hx-get="/search"
    hx-target="#results"
    hx-swap="innerHTML"
    hx-sync="#results:replace"
    hx-trigger="input changed delay:200ms from:input[name='q'], change from:select[name='year'], change from:select[name='genre'], change from:select[name='artist'], submit"
  >
    <input
      type="search"
      name="q"
      placeholder="Search artist, title, label, catalog #..."
      autofocus
    >
    <div class="filter-bar">
      <select name="year">
        <option value="">Any year</option>
        {% for y in filter_options.years %}<option value="{{ y }}">{{ y }}</option>{% endfor %}
      </select>
      <select name="genre">
        <option value="">Any genre</option>
        {% for g in filter_options.genres %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
      </select>
      <select name="artist">
        <option value="">Any artist</option>
        {% for a in filter_options.artists %}<option value="{{ a }}">{{ a }}</option>{% endfor %}
      </select>
    </div>
  </form>

  <div id="results">
    {% include "partials/release_list.html" %}
  </div>
{% endblock %}
